name: CI
on: [push, pull_request]

env:
  PYTHON_VERSION: "3.13"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('paperwriter/requirements.txt') }}
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r paperwriter/requirements.txt
          pip install ruff mypy
      - name: Lint
        run: ruff check paperwriter/
      - name: Typecheck
        run: mypy paperwriter/ --ignore-missing-imports

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('paperwriter/requirements.txt') }}
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r paperwriter/requirements.txt
          pip install pytest pytest-cov pytest-django pytest-timeout model-bakery
      - name: Run unit tests
        run: |
          cd paperwriter/backend
          python -m pytest tests/unit/ -x --timeout=30 -v
        env:
          DJANGO_SETTINGS_MODULE: paperwriter.settings
      - name: Run integration tests
        run: |
          cd paperwriter/backend
          python -m pytest tests/integration/ -x --timeout=180 -v
        env:
          DJANGO_SETTINGS_MODULE: paperwriter.settings

  coverage:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r paperwriter/requirements.txt
          pip install pytest pytest-cov pytest-django model-bakery
      - name: Run coverage
        run: |
          cd paperwriter/backend
          python -m pytest --cov=api --cov-report=term --cov-report=xml tests/
        env:
          DJANGO_SETTINGS_MODULE: paperwriter.settings
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./paperwriter/backend/coverage.xml
          fail_ci_if_error: false

  docs:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install ruff
      - name: Docs lint
        run: ruff check docs/ --ignore=D --extend-exclude=docs/adr || echo "Docs check skipped"
      - name: Verify docs exist
        run: |
          test -f docs/ARCHITECTURE.md
          test -f docs/CONTRIBUTING.md

  build:
    needs: [coverage, docs]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker compose build
